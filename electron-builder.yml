appId: com.rssreader.app
productName: RSS Reader
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - dist-electron/**/*
  - server/**/*
  - assets/**/*
  - shared/**/*
  - package.json
asarUnpack:
  - "**/*.node"
win:
  target:
    - nsis
  signAndEditExecutable: false
  icon: build/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
